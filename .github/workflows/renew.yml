name: Auto Renew Katabump

on:  
  schedule:
    - cron: '17 3 */1 * *'  # 每4天运行一次（UTC时间 03:17）
  workflow_dispatch:  # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        pip install seleniumbase
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver
        
    - name: Setup Proxy Tunnel (Gost)
      env:
        PROXY_URL: ${{ secrets.PROXY }}
      run: |
        wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip gost-linux-amd64-2.11.5.gz
        chmod +x gost-linux-amd64-2.11.5
        
        nohup ./gost-linux-amd64-2.11.5 -L :1080 -F "${PROXY_URL}" > gost.log 2>&1 &
        sleep 5
        curl -s --connect-timeout 10 -x socks5://127.0.0.1:1080 https://api.ipify.org && echo " ✅ Tunnel OK"

    - name: Run Task (Strongest Mode)
      env:
        KATABUMP_TARGET_URL: ${{ secrets.KATABUMP_TARGET_URL }}
        KATABUMP_USERNAME: ${{ secrets.KATABUMP_USERNAME }}
        KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
        PROXY: socks5://127.0.0.1:1080
      run: |
        xvfb-run -a python katabump_renewal.py
        
    - name: Upload Debug Screenshots
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: katabump-screenshots
        path: artifacts/

    - name: Send Telegram Notification
      if: always()
      run: |
        STATUS="${{ job.status }}"
        if [ "$STATUS" = "success" ]; then
          if [ -f renewal_result.txt ]; then
              MESSAGE=$(cat renewal_result.txt)
          else
              MESSAGE="✅ Katabump 续期成功"
          fi
        else
          MESSAGE="❌ Katabump 续期失败"
        fi
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          -d text="$MESSAGE"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendPhoto" \
          -F chat_id="${{ secrets.TG_CHAT_ID }}" \
          -F photo=@artifacts/final_page.png \
          -F caption="Katabump Final State" || true

